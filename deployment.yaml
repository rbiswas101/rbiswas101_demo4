apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-demo4
  labels:
    app: hello-world-demo4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world-demo4
  template:
    metadata:
      labels:
        app: hello-world-demo4
    spec:
      containers:
        - name: hello-world-demo4
          image: hello-world-demo4:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: hello-world-demo4-svc
spec:
  type: NodePort
  selector:
    app: hello-world-demo4
  ports:
    - port: 8090
      targetPort: 8090
      nodePort: 30090
