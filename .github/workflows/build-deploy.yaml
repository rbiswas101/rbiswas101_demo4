name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout code ─────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Set image tag from git commit SHA ─────────────
      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      # ── Step 3: Login to Docker Hub ───────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Step 4: Build and push Docker image ───────────────────
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hello-world-demo4:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/hello-world-demo4:latest

      # ── Step 5: Update image tag in deployment.yaml ───────────
      - name: Update deployment.yaml with new image tag
        run: |
          sed -i "s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/hello-world-demo4:${{ steps.vars.outputs.IMAGE_TAG }}|" deployment.yaml
          echo "Updated deployment.yaml with image tag: ${{ steps.vars.outputs.IMAGE_TAG }}"
          cat deployment.yaml | grep image

      # ── Step 6: Commit and push updated deployment.yaml ───────
      - name: Commit updated deployment.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment.yaml
          git commit -m "ci: update image tag to ${{ steps.vars.outputs.IMAGE_TAG }}"
          git push
